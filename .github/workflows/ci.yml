name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check src/

      - name: Pytest
        run: uv run pytest -v

      # Non-blocking (continue-on-error): flags known vulnerabilities in
      # the resolved dependency tree without failing the build over
      # them -- a real CVE in a transitive dependency shouldn't block
      # every unrelated PR, but it should be visible. pip-audit doesn't
      # read uv.lock directly, so this exports it to the portable
      # requirements.txt format pip-audit understands first.
      - name: Export locked dependencies
        run: uv export --format requirements.txt --no-hashes -o requirements-audit.txt

      - name: Dependency vulnerability audit (non-blocking)
        continue-on-error: true
        run: uv tool run pip-audit -r requirements-audit.txt --skip-editable
