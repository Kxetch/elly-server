name: Feature request
description: Suggest an idea or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before requesting a big feature, it's worth skimming
        CONTRIBUTING.md's design principles first -- some things (no
        accounts/multi-user, no shame-toned UI states, naive local
        time) are deliberate, documented constraints rather than gaps.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that the backend doesn't support today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false
