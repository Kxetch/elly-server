name: Bug report
description: Something isn't working the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please don't use
        this for security vulnerabilities -- see [SECURITY.md](../../SECURITY.md)
        for how to report those privately instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The more specific, the faster this gets fixed.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: dropdown
    id: how-run
    attributes:
      label: How are you running the backend?
      options:
        - uv run elly-api (REST API)
        - uv run elly-mcp (MCP server, stdio)
        - As a dependency of another project
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform/OS
      placeholder: e.g. macOS 15, Raspberry Pi OS Bookworm (arm64), Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: The git commit or `git describe` output you're running.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: >-
        Your terminal output. Please redact anything sensitive (diary
        content, tokens, API keys).
      render: shell
    validations:
      required: false
